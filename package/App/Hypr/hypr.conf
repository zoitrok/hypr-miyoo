# Hypr Radio options.
#
# One option per line, exactly as it would be typed on a command line. Anything
# after the first space is the value, so URLs and paths need no quoting.
# Lines starting with # are ignored. Delete or rename this file to use defaults.
#
# This exists because there is no shell on the device: MainUI just runs
# launch.sh, so without a file like this, changing any setting means editing a
# shell script on the SD card.

# Write more detail to hypr-log.txt.
#--verbose

# Show a display calibration pattern instead of the UI. Numbered boxes in the
# four corners, clean colour bars, two straight diagonals, nothing repeating.
#--testpattern

# The panel is mounted upside down, so this is on by default. Set 0 if a future
# revision is not.
#--rotate 1

# The device normally auto-sleeps after a few idle minutes, which for a radio
# means sleeping mid-song because nobody is pressing buttons. On by default;
# set 0 to let Onion's usual sleep timer apply.
#--keep-awake 1

# Fault injection, for testing resilience: the fraction of network reads that
# get disrupted by a short read, a pause, a drop or a timeout. 0.02 is 2%.
# Expect underruns and reconnects -- that is the point. Leave off for normal use.
# Currently ON for a soak run. 1% of reads get disrupted. The stream does about
# 3 reads a second, so that is a fault every ~30s: mostly short reads and brief
# pauses, with a real reconnect every few minutes. Playback should stay continuous
# because outages fit inside the ~3.5s buffer. If "ur" climbs, that is a finding.
# Comment this out for normal listening.
--chaos 0.01

# Point at a different backend.
#--url https://hypr.website/hypr.mp3
#--ws wss://hypr.website/ws
